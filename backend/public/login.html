<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedStore</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 50px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        .login-card h2 {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
        }

        .login-card p {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .logo-circle {
            width: 70px;
            height: 70px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: 800;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo-circle">MS</div>
        <h2>Admin Login</h2>
        <p>Access your medical store dashboard</p>

        <div id="status-msg" style="display:none; padding: 10px; border-radius: 8px; margin-bottom: 15px;"></div>

        <form id="login-form">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="admin@medstore.com" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>

            <button type="submit" class="btn-info" style="width: 100%; padding: 15px; margin-top: 10px;">Login to
                Dashboard</button>
        </form>

        <div style="text-align: center; margin-top: 25px; color: var(--text-muted);">
            Don't have an account? <a href="register.html"
                style="color: var(--primary); font-weight: 600; text-decoration: none;">Register Admin</a>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // Check if already logged in
        if (localStorage.getItem('token')) { window.location.href = 'dashboard.html'; }

        function showMsg(m, isErr = false) {
            const el = document.getElementById('status-msg');
            el.innerText = m;
            el.style.display = 'block';
            el.style.backgroundColor = isErr ? '#fee2e2' : '#dcfce7';
            el.style.color = isErr ? '#991b1b' : '#166534';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('email', data.email);
                    window.location.href = 'dashboard.html';
                } else {
                    showMsg(data.message || 'Login failed', true);
                }
            } catch (err) {
                showMsg('Server connection failed', true);
            }
        });
    </script>
</body>

</html>
